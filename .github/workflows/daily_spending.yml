name: Daily Spending Summary

on:
  schedule:
    - cron: "5 3 * * *"   # 10pm CDT (summer). Change to "5 4 * * *" for CST (winter)
  workflow_dispatch:       # manual trigger for testing

# Need write permission to commit state.json back to the repo
permissions:
  contents: write

jobs:
  send-spending-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push back
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spending summary
        env:
          PLAID_CLIENT_ID:    ${{ secrets.PLAID_CLIENT_ID }}
          PLAID_SECRET:       ${{ secrets.PLAID_SECRET }}
          PLAID_ACCESS_TOKEN: ${{ secrets.PLAID_ACCESS_TOKEN }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:          ${{ secrets.TWILIO_TO }}
          WEEKLY_BUDGET:      ${{ secrets.WEEKLY_BUDGET }}
          TIMEZONE:           "America/Chicago"
          CARD_NAME:          "Robinhood"
        run: python spending_summary.py

      - name: Commit updated state.json
        run: |
          git config user.name  "spending-bot"
          git config user.email "bot@noreply.github.com"
          git add state.json
          # Only commit if state.json actually changed
          git diff --cached --quiet || git commit -m "chore: update transaction state [skip ci]"
          git push
